name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    
    steps:
      - name: Create metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.LOWLIGHTER_TOKEN }}
          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 4919526
          plugin_stackoverflow_sections: answers-top, questions-top
